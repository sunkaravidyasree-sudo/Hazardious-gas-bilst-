<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup | RuralGas Protect</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <h1>RuralGas Protect</h1>
        <nav><a href="/">Home</a></nav>
    </header>

    <div class="container animate-in">
        <div class="card" style="max-width: 500px; margin: 4rem auto;">
            <h2 style="text-align: center; margin-bottom: 2rem;">Create Account</h2>

            {% if error %}
            <p style="color: var(--danger); text-align: center; margin-bottom: 1rem;">{{ error }}</p>
            {% endif %}

            <form method="POST">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" required placeholder="Choose a username">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required placeholder="Choose a password">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Sign Up</button>
            </form>

            <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
                Already have an account? <a href="/login" style="color: var(--accent-color);">Login</a>
            </p>
        </div>
    </div>
</body>

</html>
