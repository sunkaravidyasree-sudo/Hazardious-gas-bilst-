<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make a Prediction | RuralGas Protect</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <h1>RuralGas Protect</h1>
        <nav>
            <a href="/">Home</a>
            {% if session.role == 'admin' %}
            <a href="/dashboard">Dashboard</a>
            {% endif %}
            <a href="/logout">Logout</a>
        </nav>
    </header>

    <div class="container animate-in">
        <div class="card" style="max-width: 800px; margin: 2rem auto;">
            <h2 style="margin-bottom: 2rem;">Hazardous Gas Prediction</h2>
            <p style="color: var(--text-muted); margin-bottom: 2rem;">Input sensor readings below to predict air safety
                levels using our BiLSTM Neural Network.</p>

            {% if error %}
            <p style="color: var(--danger); margin-bottom: 1rem;">{{ error }}</p>
            {% endif %}

            <form method="POST">
                <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                    <div class="form-group">
                        <label>MQ2 Sensor (Smoke/LPG)</label>
                        <input type="number" step="0.01" name="mq2" required placeholder="e.g. 45.5">
                    </div>
                    <div class="form-group">
                        <label>MQ135 Sensor (Air Quality)</label>
                        <input type="number" step="0.01" name="mq135" required placeholder="e.g. 30.2">
                    </div>
                    <div class="form-group">
                        <label>CO Sensor (Carbon Monoxide)</label>
                        <input type="number" step="0.01" name="co" required placeholder="e.g. 10.5">
                    </div>
                    <div class="form-group">
                        <label>Temperature (°C)</label>
                        <input type="number" step="0.01" name="temp" required placeholder="e.g. 25.0">
                    </div>
                    <div class="form-group">
                        <label>Humidity (%)</label>
                        <input type="number" step="0.01" name="humidity" required placeholder="e.g. 60.0">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" style="margin-top: 1rem; width: 100%;">Run Prediction
                    Analysis</button>
            </form>
        </div>
    </div>
</body>

</html>
