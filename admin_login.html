<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | RuralGas Protect</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <h1>RuralGas Protect</h1>
        <nav><a href="/">Home</a></nav>
    </header>

    <div class="container animate-in">
        <div class="card" style="max-width: 500px; margin: 4rem auto; border-color: var(--warning);">
            <h2 style="text-align: center; margin-bottom: 2rem; color: var(--warning);">Admin Access</h2>

            {% if error %}
            <p style="color: var(--danger); text-align: center; margin-bottom: 1rem;">{{ error }}</p>
            {% endif %}

            <form method="POST">
                <div class="form-group">
                    <label>Admin Username</label>
                    <input type="text" name="username" required placeholder="Admin username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required placeholder="Admin password">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; background: var(--warning);">Login as
                    Admin</button>
            </form>
        </div>
    </div>
</body>

</html>
